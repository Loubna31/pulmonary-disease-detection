<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — PneumoIA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-card shadow-lg">

    <!-- Header -->
    <div class="login-header text-center mb-4">
      <img src="{{ url_for('static', filename='logo_chu.png') }}"
           alt="CHU Oran"
           style="width:90px;height:90px;object-fit:contain;border-radius:50%;
                  box-shadow:0 6px 20px rgba(16,185,129,.35);margin-bottom:.75rem;" />
      <h2 class="text-white fw-bold mb-0" style="letter-spacing:-.01em;">PneumoIA</h2>
      <p class="small mt-1 mb-0" style="color:#6ee7b7;opacity:.8;">
        CHU Oran — Système d'aide au diagnostic pulmonaire par IA
      </p>
    </div>

    <!-- Alerts -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

      <div class="mb-3">
        <label class="form-label fw-semibold small" style="color:#a7f3d0;">
          <i class="fa-solid fa-envelope me-1"></i>Adresse email
        </label>
        <input type="email" name="email" class="form-control login-input"
               placeholder="votre@email.com" required autofocus />
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold small" style="color:#a7f3d0;">
          <i class="fa-solid fa-lock me-1"></i>Mot de passe
        </label>
        <div class="input-group">
          <input type="password" name="password" id="passwordField"
                 class="form-control login-input" placeholder="••••••••" required />
          <button type="button"
                  class="btn"
                  style="background:rgba(255,255,255,.07);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;"
                  id="togglePwd">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-login w-100 py-2 fw-bold fs-6">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Se connecter
      </button>
    </form>

    <div class="text-center mt-4">
      <span class="x-small" style="color:#6ee7b7;opacity:.55;">
        <i class="fa-solid fa-shield-halved me-1"></i>
        Accès sécurisé — Établissement hospitalier
      </span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePwd').addEventListener('click', function () {
    const field = document.getElementById('passwordField');
    const icon  = document.getElementById('eyeIcon');
    if (field.type === 'password') {
      field.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      field.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });
</script>
</body>
</html>
